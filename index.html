<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f4fc4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aanvraagbord">
<link rel="manifest" href="manifest.webmanifest">
<title>Aanvraagbord Mobiel</title>
<style>
:root{
 --bg:#f3f6fa;--card:#fff;--text:#172033;--muted:#667085;--line:#dfe5ec;
 --brand:#0f4fc4;--brand2:#0b3f9f;--ok:#138a4b;--warn:#a85f00;--danger:#bf2f24;
 --shadow:0 10px 28px rgba(16,24,40,.10);--r:18px
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
body{padding-bottom:calc(82px + env(safe-area-inset-bottom))}
.topbar{
 position:sticky;top:0;z-index:20;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
 background:linear-gradient(135deg,#113b8b,#1769e8);color:#fff;box-shadow:var(--shadow)
}
.topbar h1{font-size:1.25rem;margin:0}.topbar p{margin:4px 0 0;font-size:.86rem;opacity:.88}
main{max-width:680px;margin:0 auto;padding:16px}
.view{display:none}.view.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
h2,h3{margin:0 0 12px}.muted{color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--shadow)}
.stat span{font-size:.82rem;color:var(--muted)}.stat strong{display:block;font-size:1.7rem;margin-top:3px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quick button{min-height:88px;border:0;border-radius:17px;background:#fff;box-shadow:var(--shadow);font-weight:800;color:var(--text);font-size:1rem;padding:14px}
.quick .primary{background:linear-gradient(135deg,#0f4fc4,#2476ee);color:#fff}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
label{font-weight:750;font-size:.9rem}
input,select,textarea{width:100%;font:inherit;border:1px solid var(--line);border-radius:13px;padding:13px;background:#fff;color:var(--text)}
textarea{min-height:110px;resize:vertical}
.btn{width:100%;border:0;border-radius:14px;padding:14px 15px;font-weight:850;font-size:1rem;cursor:pointer}
.btn.primary{background:var(--brand);color:#fff}.btn.secondary{background:#e8eefc;color:#204897}.btn.success{background:#e1f5e9;color:var(--ok)}.btn.danger{background:#fde9e7;color:var(--danger)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.actions .full{grid-column:1/-1}
.job{background:#fff;border:1px solid var(--line);border-radius:17px;padding:15px;box-shadow:var(--shadow);margin-bottom:12px}
.jobhead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.job h3{font-size:1.02rem;margin:0}.meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;color:var(--muted);font-size:.84rem;margin-top:10px}
.badge{display:inline-flex;border-radius:999px;padding:5px 8px;font-size:.72rem;font-weight:850;white-space:nowrap}
.nieuw{background:#e9f1ff;color:#174fa8}.behandeling{background:#fff1dc;color:var(--warn)}
.ingevuld{background:#e2f5e9;color:var(--ok)}.geannuleerd{background:#eef0f3;color:#475467}
.note{background:#f7f9fc;border-left:4px solid #9db8ec;border-radius:9px;padding:10px;margin-top:10px;font-size:.88rem}
.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}.toolbar .full{grid-column:1/-1}
.bottomnav{
 position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.97);
 backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));
 display:grid;grid-template-columns:repeat(4,1fr);gap:4px
}
.bottomnav button{border:0;background:transparent;color:#667085;padding:8px 4px;border-radius:12px;font-size:.72rem;font-weight:750}
.bottomnav button .icon{display:block;font-size:1.25rem;margin-bottom:2px}
.bottomnav button.active{background:#eaf1ff;color:var(--brand)}
.toast{position:fixed;left:14px;right:14px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:50;background:#172033;color:#fff;padding:13px 15px;border-radius:13px;display:none;box-shadow:var(--shadow);max-width:650px;margin:auto}
.empty{text-align:center;padding:28px 10px;color:var(--muted)}
.install{background:#edf4ff;border:1px solid #c9dbfb;color:#19407f;border-radius:13px;padding:12px;margin-bottom:14px;font-size:.9rem}
@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr)}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.formgrid .full{grid-column:1/-1}}
</style>
</head>
<body>
<header class="topbar">
  <h1>Aanvraagbord</h1>
  <p>Interne aanvragen voor jou en je collega’s</p>
</header>

<main>
<section id="home" class="view active">
  <div id="installHint" class="install">Open dit bestand in je browser. Via het browsermenu kun je het later aan je beginscherm toevoegen zodra het online wordt geplaatst.</div>
  <div class="stats">
    <div class="stat"><span>Nieuw</span><strong id="stNieuw">0</strong></div>
    <div class="stat"><span>Behandeling</span><strong id="stBehandeling">0</strong></div>
    <div class="stat"><span>Ingevuld</span><strong id="stIngevuld">0</strong></div>
    <div class="stat"><span>Totaal</span><strong id="stTotaal">0</strong></div>
  </div>
  <div class="quick">
    <button class="primary" onclick="showView('new')">➕<br>Nieuwe aanvraag</button>
    <button onclick="showView('list')">📋<br>Open aanvragen</button>
  </div>
  <div class="card" style="margin-top:14px">
    <h3>Laatste aanvragen</h3>
    <div id="latest"></div>
  </div>
</section>

<section id="new" class="view">
  <div class="card">
    <h2>Nieuwe aanvraag</h2>
    <form id="requestForm">
      <div class="formgrid">
        <div class="field"><label>Locatie</label><input id="location" required placeholder="Plaats of project"></div>
        <div class="field"><label>Soort vakman</label>
          <select id="trade" required>
            <option value="">Kies soort</option><option>Timmerman</option><option>Bouwspecialist</option><option>Betontimmerman</option>
          </select>
        </div>
        <div class="field"><label>Opdrachtgever</label><input id="client" required placeholder="Naam opdrachtgever"></div>
        <div class="field"><label>Aantal mensen</label><input id="people" type="number" min="1" value="1" required></div>
        <div class="field"><label>Startdatum</label><input id="startDate" type="date" required></div>
        <div class="field"><label>Einddatum</label><input id="endDate" type="date"></div>
        <div class="field"><label>Toewijzen aan</label><select id="owner"></select></div>
        <div class="field"><label>Prioriteit</label><select id="priority"><option>Normaal</option><option>Hoog</option><option>Spoed</option></select></div>
        <div class="field full"><label>Werkzaamheden</label><textarea id="work" required placeholder="Omschrijf de werkzaamheden"></textarea></div>
        <div class="field full"><label>Bijzonderheden</label><textarea id="details" placeholder="Tijden, certificaten, kleding, gereedschap enzovoort"></textarea></div>
      </div>
      <button class="btn primary" type="submit">Aanvraag opslaan</button>
    </form>
  </div>
</section>

<section id="list" class="view">
  <div class="toolbar">
    <input class="full" id="search" placeholder="Zoeken">
    <select id="filterStatus"><option value="">Alle statussen</option><option>Nieuw</option><option>In behandeling</option><option>Ingevuld</option><option>Geannuleerd</option></select>
    <select id="filterTrade"><option value="">Alle vakgroepen</option><option>Timmerman</option><option>Bouwspecialist</option><option>Betontimmerman</option></select>
  </div>
  <div id="requestList"></div>
</section>

<section id="team" class="view">
  <div class="card">
    <h2>Collega toevoegen</h2>
    <form id="colleagueForm">
      <div class="field"><label>Naam</label><input id="colName" required></div>
      <div class="field"><label>E-mail</label><input id="colEmail" type="email" required></div>
      <button class="btn primary" type="submit">Toevoegen</button>
    </form>
  </div>
  <div class="card"><h2>Collega’s</h2><div id="colleagueList"></div></div>
</section>
</main>

<nav class="bottomnav">
  <button class="active" data-view="home"><span class="icon">🏠</span>Start</button>
  <button data-view="new"><span class="icon">➕</span>Nieuw</button>
  <button data-view="list"><span class="icon">📋</span>Aanvragen</button>
  <button data-view="team"><span class="icon">👥</span>Collega’s</button>
</nav>

<div id="toast" class="toast"></div>

<script>
const K={req:'aanvraagbord_mobile_requests',col:'aanvraagbord_mobile_colleagues'};
let colleagues=JSON.parse(localStorage.getItem(K.col)||'null')||[
 {id:crypto.randomUUID(),name:'Ikzelf',email:'ik@bedrijf.nl'},
 {id:crypto.randomUUID(),name:'Mijn collega',email:'collega@bedrijf.nl'}
];
let requests=JSON.parse(localStorage.getItem(K.req)||'[]');

function save(){localStorage.setItem(K.col,JSON.stringify(colleagues));localStorage.setItem(K.req,JSON.stringify(requests))}
function esc(v=''){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmt(d){return d?new Date(d+'T12:00:00').toLocaleDateString('nl-NL'):'-'}
function ownerName(id){return colleagues.find(c=>c.id===id)?.name||'Niet toegewezen'}
function cls(s){return s==='Nieuw'?'nieuw':s==='In behandeling'?'behandeling':s==='Ingevuld'?'ingevuld':'geannuleerd'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2800)}
function showView(id){
 document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
 document.querySelectorAll('.bottomnav button').forEach(b=>b.classList.toggle('active',b.dataset.view===id));
 document.getElementById(id).classList.add('active');render();scrollTo(0,0)
}
document.querySelectorAll('.bottomnav button').forEach(b=>b.onclick=()=>showView(b.dataset.view));

requestForm.onsubmit=e=>{
 e.preventDefault();
 requests.unshift({id:crypto.randomUUID(),location:location.value.trim(),trade:trade.value,client:client.value.trim(),
 people:Number(people.value),startDate:startDate.value,endDate:endDate.value,owner:owner.value,priority:priority.value,
 work:work.value.trim(),details:details.value.trim(),status:'Nieuw',notes:[],createdAt:new Date().toISOString()});
 save();e.target.reset();people.value=1;toast('Aanvraag opgeslagen.');showView('list')
};
colleagueForm.onsubmit=e=>{
 e.preventDefault();colleagues.push({id:crypto.randomUUID(),name:colName.value.trim(),email:colEmail.value.trim()});
 save();e.target.reset();render();toast('Collega toegevoegd.')
};
['search','filterStatus','filterTrade'].forEach(id=>document.getElementById(id).addEventListener('input',renderRequests));

function card(r,compact=false){
 const notes=(r.notes||[]).slice(-1).map(n=>`<div class="note"><strong>${esc(n.by)}</strong><br>${esc(n.text)}</div>`).join('');
 return `<article class="job">
  <div class="jobhead"><h3>${esc(r.trade)} – ${esc(r.location)}</h3><span class="badge ${cls(r.status)}">${esc(r.status)}</span></div>
  <div class="meta"><span>🏢 ${esc(r.client)}</span><span>📅 ${fmt(r.startDate)}</span><span>👷 ${r.people} persoon/personen</span><span>👤 ${esc(ownerName(r.owner))}</span></div>
  ${compact?'':`<p><strong>Werkzaamheden</strong><br>${esc(r.work)}</p>${r.details?`<p><strong>Bijzonderheden</strong><br>${esc(r.details)}</p>`:''}${notes}
  <div class="actions">
   <button class="btn secondary" onclick="setStatus('${r.id}','In behandeling')">Pak op</button>
   <button class="btn success" onclick="setStatus('${r.id}','Ingevuld')">Ingevuld</button>
   <button class="btn secondary" onclick="assignReq('${r.id}')">Toewijzen</button>
   <button class="btn secondary" onclick="addNote('${r.id}')">Opmerking</button>
   <button class="btn danger full" onclick="setStatus('${r.id}','Geannuleerd')">Annuleren</button>
  </div>`}
 </article>`
}
function renderRequests(){
 const q=(search.value||'').toLowerCase(),fs=filterStatus.value,ft=filterTrade.value;
 const arr=requests.filter(r=>(!fs||r.status===fs)&&(!ft||r.trade===ft)&&(!q||[r.location,r.client,r.work,r.trade].join(' ').toLowerCase().includes(q)));
 requestList.innerHTML=arr.length?arr.map(r=>card(r)).join(''):'<div class="empty">Geen aanvragen gevonden.</div>'
}
function render(){
 owner.innerHTML='<option value="">Niet toewijzen</option>'+colleagues.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
 colleagueList.innerHTML=colleagues.length?colleagues.map(c=>`<div class="job"><strong>${esc(c.name)}</strong><div class="muted">${esc(c.email)}</div><div class="actions"><button class="btn danger full" onclick="removeColleague('${c.id}')">Verwijderen</button></div></div>`).join(''):'<div class="empty">Nog geen collega’s.</div>';
 latest.innerHTML=requests.length?requests.slice(0,3).map(r=>card(r,true)).join(''):'<div class="empty">Nog geen aanvragen.</div>';
 stNieuw.textContent=requests.filter(r=>r.status==='Nieuw').length;
 stBehandeling.textContent=requests.filter(r=>r.status==='In behandeling').length;
 stIngevuld.textContent=requests.filter(r=>r.status==='Ingevuld').length;
 stTotaal.textContent=requests.length;
 renderRequests()
}
function setStatus(id,status){const r=requests.find(x=>x.id===id);if(r){r.status=status;save();render();toast('Status bijgewerkt.')}}
function assignReq(id){
 const r=requests.find(x=>x.id===id);if(!r)return;
 const menu=colleagues.map((c,i)=>`${i+1}. ${c.name}`).join('\n');const n=prompt(`Kies een nummer:\n${menu}`);const c=colleagues[Number(n)-1];
 if(c){r.owner=c.id;if(r.status==='Nieuw')r.status='In behandeling';save();render();toast(`Toegewezen aan ${c.name}.`)}
}
function addNote(id){const r=requests.find(x=>x.id===id);if(!r)return;const text=prompt('Opmerking:');if(!text)return;const by=prompt('Naam collega:','Ikzelf')||'Onbekend';r.notes.push({text,by,at:new Date().toISOString()});save();render();toast('Opmerking toegevoegd.')}
function removeColleague(id){if(!confirm('Collega verwijderen?'))return;colleagues=colleagues.filter(c=>c.id!==id);requests.forEach(r=>{if(r.owner===id)r.owner=''});save();render()}
if('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('sw.js');
render()
</script>
</body>
</html>
